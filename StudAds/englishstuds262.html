<html>
<head>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
  <style type="text/css">
    .mySlides {display:none;}
    body{background: #222;}
  .w3-content{margin-top: 10%; border: 10px Solid #664D7D;}
  .w3-black{background-color: #664D7D !important;} .w3-black:hover{background-color: #76873f !important;}
    </style>
  <script type="text/javascript">
    var slideIndex = 1;
showDivs(slideIndex);

function plusDivs(n) {
  showDivs(slideIndex += n);
}

function showDivs(n) {
  var i;
  var x = document.getElementsByClassName("mySlides");
  if (n > x.length) {slideIndex = 1}
  if (n < 1) {slideIndex = x.length} ;
  for (i = 0; i < x.length; i++) {
    x[i].style.display = "none";
  }
  x[slideIndex-1].style.display = "block";
}</script>
</head>
<body>

  <div class="w3-content w3-display-container">
  <img class="mySlides" src="cruinniuc.png" style="width:100%; display: block;">
  <img class="mySlides" src="empirequality.png" style="width:100%">
  <img class="mySlides" src="heisman.png" style="width:100%">
  <img class="mySlides" src="keppel.png" style="width:100%">
  <img class="mySlides" src="lichtenfeld.png" style="width:100%">
  <img class="mySlides" src="mitcham.png" style="width:100%">

  <button class="w3-button w3-black w3-display-left" onclick="plusDivs(-1)">&#10094;</button>
  <button class="w3-button w3-black w3-display-right" onclick="plusDivs(1)">&#10095;</button>
</div>
  
</body>  
</html>
